name: Setup HexSign CLI
description: Install the HexSign CLI and (optionally) authenticate, so subsequent steps can manage Apple signing material from CI.
author: HexSign

branding:
  icon: key
  color: purple

inputs:
  version:
    description: HexSign CLI release tag to install (e.g. v0.2.1). Use "latest" for the most recent release.
    required: false
    default: latest
  client-id:
    description: HexSign service-credential client ID. When set together with client-secret, subsequent steps run in machine mode automatically.
    required: false
    default: ""
  client-secret:
    description: HexSign service-credential client secret. Pass via ${{ secrets.* }} — never hardcode.
    required: false
    default: ""
  scopes:
    description: Space-separated OAuth scopes. Leave empty to use the CLI default (hexsign-api/read hexsign-api/write).
    required: false
    default: ""

outputs:
  version:
    description: Resolved CLI version that was installed (e.g. v0.2.1).
    value: ${{ steps.install.outputs.version }}
  path:
    description: Absolute path to the installed hexsign binary.
    value: ${{ steps.install.outputs.path }}

runs:
  using: composite
  steps:
    - id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        case "$(uname -s)" in
          Darwin) os=darwin ;;
          Linux)  os=linux ;;
          MINGW*|MSYS*|CYGWIN*) os=windows ;;
          *) echo "::error::Unsupported OS: $(uname -s)"; exit 1 ;;
        esac

        case "$(uname -m)" in
          x86_64|amd64) arch=amd64 ;;
          arm64|aarch64) arch=arm64 ;;
          *) echo "::error::Unsupported arch: $(uname -m)"; exit 1 ;;
        esac

        if [ "$os" = "windows" ] && [ "$arch" = "arm64" ]; then
          echo "::error::Windows arm64 builds are not published."
          exit 1
        fi

        tag="$INPUT_VERSION"
        if [ "$tag" = "latest" ] || [ -z "$tag" ]; then
          tag="$(gh release view --repo hexsign/hexsign-cli --json tagName -q .tagName)"
        fi
        version_no_v="${tag#v}"

        if [ "$os" = "windows" ]; then
          asset="hexsign_${version_no_v}_${os}_${arch}.zip"
        else
          asset="hexsign_${version_no_v}_${os}_${arch}.tar.gz"
        fi

        workdir="$(mktemp -d)"
        cd "$workdir"

        echo "Downloading ${asset} and checksums.txt from ${tag}…"
        gh release download "$tag" \
          --repo hexsign/hexsign-cli \
          --pattern "$asset" \
          --pattern "checksums.txt"

        echo "Verifying SHA-256…"
        if command -v sha256sum >/dev/null 2>&1; then
          grep " ${asset}$" checksums.txt | sha256sum -c -
        else
          # macOS runners: shasum ships by default, sha256sum doesn't.
          grep " ${asset}$" checksums.txt | shasum -a 256 -c -
        fi

        install_dir="${RUNNER_TOOL_CACHE:-$HOME/.hexsign}/hexsign/${version_no_v}/${arch}"
        mkdir -p "$install_dir"

        if [ "$os" = "windows" ]; then
          unzip -q "$asset" -d "$install_dir"
          bin="$install_dir/hexsign.exe"
        else
          tar -xzf "$asset" -C "$install_dir"
          bin="$install_dir/hexsign"
          chmod +x "$bin"
        fi

        echo "$install_dir" >> "$GITHUB_PATH"
        echo "version=$tag" >> "$GITHUB_OUTPUT"
        echo "path=$bin"   >> "$GITHUB_OUTPUT"

        "$bin" --version || true

    - name: Configure machine-mode authentication
      if: inputs.client-id != '' && inputs.client-secret != ''
      shell: bash
      env:
        INPUT_CLIENT_ID: ${{ inputs.client-id }}
        INPUT_CLIENT_SECRET: ${{ inputs.client-secret }}
        INPUT_SCOPES: ${{ inputs.scopes }}
      run: |
        set -euo pipefail
        echo "HEXSIGN_CLIENT_ID=${INPUT_CLIENT_ID}"         >> "$GITHUB_ENV"
        echo "::add-mask::${INPUT_CLIENT_SECRET}"
        echo "HEXSIGN_CLIENT_SECRET=${INPUT_CLIENT_SECRET}" >> "$GITHUB_ENV"
        if [ -n "${INPUT_SCOPES}" ]; then
          echo "HEXSIGN_CLIENT_SCOPES=${INPUT_SCOPES}" >> "$GITHUB_ENV"
        fi
